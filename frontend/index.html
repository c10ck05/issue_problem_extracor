<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Issue Problem Extractor</title>
<!-- 인터페이스에 최적화된 Pretendard 폰트 불러오기 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root {
    --bg-main: #0b0f19;
    --bg-card: #161b26;
    --border-color: #262f40;
    --text-primary: #f3f4f6;
    --text-secondary: #9ca3af;
    --brand-accent: #3b82f6; /* 스마트 블루 */
    --brand-accent-glow: rgba(59, 130, 246, 0.15);
    --red-accent: #ef4444;
    --red-glow: rgba(239, 68, 68, 0.15);
    --green-badge: #10b981;
  }

  * {
    box-sizing: border-box;
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    transition: all 0.2s ease;
  }

  body {
    margin: 0;
    background-color: var(--bg-main);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }

  .container {
    width: 100%;
    max-width: 840px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--brand-accent);
    background: var(--brand-accent-glow);
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 16px;
    border: 1px solid rgba(59, 130, 246, 0.3);
  }

  h1 {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin: 0 0 12px;
    background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    color: var(--text-secondary);
    font-size: 16px;
    margin: 0;
    line-height: 1.5;
  }

  /* 검색 영역 */
  .search-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    margin-bottom: 24px;
  }

  .input-group {
    display: flex;
    gap: 12px;
  }

  .input-group input {
    flex: 1;
    background: #1e2533;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 16px;
    color: var(--text-primary);
    outline: none;
  }

  .input-group input:focus {
    border-color: var(--brand-accent);
    box-shadow: 0 0 12px var(--brand-accent-glow);
  }

  .input-group input::placeholder {
    color: #4b5563;
  }

  button {
    background: linear-gradient(135deg, var(--brand-accent) 0%, #1d4ed8 100%);
    color: #ffffff;
    border: none;
    border-radius: 12px;
    padding: 0 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
  }

  button:active { transform: translateY(1px); }

  button:disabled {
    background: #1f2937;
    color: #4b5563;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* 상태 영역 */
  .status-message {
    margin-top: 16px;
    font-size: 14px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-message.error { color: var(--red-accent); }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-top-color: var(--brand-accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 결과 패널 */
  .result-panel {
    display: none;
    opacity: 0;
    transform: translateY(20px);
  }

  .result-panel.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  .report-header {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 24px;
    border-left: 3px solid var(--brand-accent);
    padding-left: 10px;
  }

  /* 📄 페이지 구분선 디자인 */
  .page-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 40px 0 24px;
    position: relative;
  }

  .page-divider::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-color) 20%, var(--border-color) 80%, transparent);
    z-index: 1;
  }

  .page-badge {
    position: relative;
    z-index: 2;
    background: #1e293b;
    border: 1px solid var(--brand-accent);
    color: #3b82f6;
    font-family: monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 30px;
    letter-spacing: 0.1em;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }

  /* 카테고리 대시보드 카드 */
  .category-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  }

  .category-title-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    border-bottom: 1px solid #1e2533;
    padding-bottom: 16px;
  }

  .category-name {
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
  }

  .badge {
    font-size: 12px;
    font-weight: 600;
    background: rgba(16, 185, 129, 0.1);
    color: var(--green-badge);
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  /* 문제점 상세 */
  .problem-item {
    background: #111622;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .problem-item:last-child { margin-bottom: 0; }

  .problem-title {
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    margin: 0 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .problem-title::before {
    content: "•";
    color: var(--red-accent);
    font-size: 20px;
  }

  .problem-desc {
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--text-secondary);
    margin: 0 0 16px;
  }

  .source-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .source-link {
    background: #1c2333;
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    font-size: 12px;
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 8px;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .source-link:hover {
    border-color: var(--brand-accent);
    background: var(--brand-accent-glow);
    color: #ffffff;
  }

  /* ⚡ 스켈레톤 로딩 UI 디자인 */
  .skeleton-container {
    display: none;
    margin-top: 20px;
  }

  .skeleton-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 30px;
    opacity: 0.6;
  }

  .skeleton-line {
    background: linear-gradient(90deg, #1e2533 25%, #283147 50%, #1e2533 75%);
    background-size: 200% 100%;
    animation: loading-pulse 1.5s infinite;
    border-radius: 6px;
  }

  @keyframes loading-pulse {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  #moreBtn {
    background: #1e2533;
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    box-shadow: none;
    padding: 16px;
    width: 100%;
    justify-content: center;
    margin-top: 24px;
    display: none;
  }

  #moreBtn:hover {
    background: #283147;
    border-color: #3b82f6;
  }

  footer {
    text-align: center;
    margin-top: 60px;
    font-size: 12px;
    color: #4b5563;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">Analyzer System</div>
    <h1>이슈 핵심 문제점 분석기</h1>
    <p>실시간 구글 뉴스를 다차원 수집하여 핵심적인 사회적 갈등과 문제점만 정제해 드립니다.</p>
  </header>

  <main>
    <section class="search-card">
      <label class="status-message" style="margin-top:0; margin-bottom:10px; font-weight: 700; color:var(--text-primary);">분석하고 싶은 키워드를 쓰세요</label>
      <div class="input-group">
        <input id="keywordInput" type="text" placeholder="예: 국민연금 개혁, 딥페이크 규제..." autocomplete="off" spellcheck="false" />
        <button id="crawlBtn"><span>새 분석 시작</span></button>
      </div>
      <div id="statusContainer" class="status-message">
        <div id="statusSpinner" class="spinner"></div>
        <span id="statusText">원하는 키워드를 검색하면 실시간 분석이 시작됩니다.</span>
      </div>
    </section>

    <!-- 결과 대시보드 -->
    <section class="result-panel" id="newsResultPanel">
      <div class="report-header" id="newsReportTitle">🔴 실시간 분석 리포트</div>
      
      <!-- 실시간 데이터가 페이지 단위로 묶여 누적될 곳 -->
      <div id="categoryContainer"></div>

      <!-- ⚡ 추가 분석 로딩 중에 뜰 스켈레톤 디자인 -->
      <div id="skeletonLoading" class="skeleton-container">
        <div class="skeleton-card">
          <div class="skeleton-line" style="height: 24px; width: 40%; margin-bottom: 20px;"></div>
          <div class="skeleton-line" style="height: 80px; width: 100%; margin-bottom: 16px;"></div>
          <div class="skeleton-line" style="height: 80px; width: 100%;"></div>
        </div>
      </div>

      <button id="moreBtn">더 많은 뉴스 분석하여 누적하기</button>
    </section>
  </main>

  <footer>
    &copy; 2026 Problem Extractor. All rights reserved. FastAPI &middot; Groq Powered.
  </footer>
</div>

<script>
const API_BASE = "http://localhost:8000";

const keywordInput = document.getElementById('keywordInput');
const crawlBtn = document.getElementById('crawlBtn');
const moreBtn = document.getElementById('moreBtn');
const statusSpinner = document.getElementById('statusSpinner');
const statusText = document.getElementById('statusText');
const statusContainer = document.getElementById('statusContainer');
const newsResultPanel = document.getElementById('newsResultPanel');
const categoryContainer = document.getElementById('categoryContainer');
const newsReportTitle = document.getElementById('newsReportTitle');
const skeletonLoading = document.getElementById('skeletonLoading');

let currentPage = 1;
let analysedArticles = 0;
let currentKeyword = "";

function setStatus(msg, isError = false, isLoading = false) {
  statusText.textContent = msg;
  statusContainer.classList.toggle('error', isError);
  statusSpinner.style.display = isLoading ? 'block' : 'none';
}

function showSkeleton(show) {
  skeletonLoading.style.display = show ? 'block' : 'none';
  if (show) {
    // 로딩이 시작되면 '더보기' 버튼 아래로 자동 포커스 스크롤
    skeletonLoading.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str) {
  return escapeHtml(str).replace(/"/g, '&quot;');
}

// 결과를 페이지 단위로 묶어서 안전하게 렌더링
function renderCategories(data, isAppend = false) {
  if (!isAppend) {
    categoryContainer.innerHTML = '';
    analysedArticles = 0;
  }
  
  analysedArticles += data.article_count;
  newsReportTitle.textContent = `🔴 "${data.keyword}" 심층 문제 분석 결과 (누적 뉴스 ${analysedArticles}건)`;

  if (!data.categories || !data.categories.length) {
    if (!isAppend) {
      categoryContainer.innerHTML = '<p style="font-size:15px; color:var(--text-secondary); text-align:center; padding: 40px 0;">도출된 명확한 유형이 없습니다.</p>';
    }
    newsResultPanel.classList.add('visible');
    return;
  }

  // 1. 만약 추가 로드(isAppend) 상황이라면 페이지 구분선 먼저 삽입
  if (isAppend) {
    const divider = document.createElement('div');
    divider.className = 'page-divider';
    divider.innerHTML = `<span class="page-badge">PAGE ${currentPage} RESULTS</span>`;
    categoryContainer.appendChild(divider);
  }

  // 2. 해당 페이지 영역용 전용 컨테이너 박스 생성
  const pageContainer = document.createElement('div');
  pageContainer.className = 'page-section-container';

  data.categories.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.innerHTML = `
      <div class="category-title-bar">
        <span class="category-name">${escapeHtml(cat.category || '기타 분류')}</span>
        <span class="badge">${cat.problems.length}건 분석됨</span>
      </div>
      <div class="problem-list-container"></div>
    `;

    const listContainer = card.querySelector('.problem-list-container');

    (cat.problems || []).forEach(p => {
      const item = document.createElement('div');
      item.className = 'problem-item';
      
      const sourcesHtml = (p.sources || [])
        .map(s => `<a class="source-link" href="${escapeAttr(s.link || '#')}" target="_blank" rel="noopener">${escapeHtml(s.title || '출처 링크')}</a>`)
        .join('');

      item.innerHTML = `
        <div class="problem-title">${escapeHtml(p.title || '')}</div>
        <div class="problem-desc">${escapeHtml(p.description || '')}</div>
        <div class="source-container">${sourcesHtml}</div>
      `;
      listContainer.appendChild(item);
    });

    pageContainer.appendChild(card);
  });

  categoryContainer.appendChild(pageContainer);
  newsResultPanel.classList.add('visible');
  
  if (data.article_count > 0) {
    moreBtn.style.display = 'flex';
  } else {
    moreBtn.style.display = 'none';
  }

  // 신규 추가된 페이지로 스무스하게 스크롤 이동
  if (isAppend) {
    pageContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

async function fetchAnalysis(page) {
  const res = await fetch(`${API_BASE}/crawl`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ 
      keyword: currentKeyword, 
      max_articles: 6,
      page: page
    })
  });

  if (!res.ok) {
    const errBody = await res.json().catch(() => ({}));
    throw new Error(errBody.detail || `오류 발생 (${res.status})`);
  }
  return await res.json();
}

async function startNewAnalysis() {
  const keyword = keywordInput.value.trim();
  if (!keyword) {
    setStatus('검색할 키워드를 먼저 입력해 주세요.', true);
    return;
  }

  currentKeyword = keyword;
  currentPage = 1;
  crawlBtn.disabled = true;
  moreBtn.disabled = true;
  newsResultPanel.classList.remove('visible');
  categoryContainer.innerHTML = '';
  setStatus('관련 기사를 읽고 문제 맥락 분석하는 중...', false, true);

  try {
    const data = await fetchAnalysis(currentPage);
    renderCategories(data, false);
    setStatus('초기 분석 보고서 생성이 완료되었습니다.');
  } catch (err) {
    setStatus(`오류: ${err.message}`, true);
  } finally {
    crawlBtn.disabled = false;
    moreBtn.disabled = false;
  }
}

async function loadMoreAnalysis() {
  currentPage += 1;
  crawlBtn.disabled = true;
  moreBtn.disabled = true;
  
  setStatus(`다음 기사를 스캔하는 중...`, false, true);
  showSkeleton(true); // ⚡ 스켈레톤 UI 켜기

  try {
    const data = await fetchAnalysis(currentPage);
    showSkeleton(false); // ⚡ 스켈레톤 UI 끄기
    renderCategories(data, true); 
    setStatus(`성공적으로 PAGE ${currentPage} 데이터를 분석 및 축적했습니다.`);
  } catch (err) {
    showSkeleton(false);
    setStatus(`추가 정보를 가져오지 못했으나, 기존 리포트는 유지됩니다.`, true);
    currentPage -= 1; 
  } finally {
    crawlBtn.disabled = false;
    moreBtn.disabled = false;
  }
}

crawlBtn.addEventListener('click', startNewAnalysis);
moreBtn.addEventListener('click', loadMoreAnalysis);
keywordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startNewAnalysis();
});
</script>

</body>
</html>
